version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: adaptive-astro-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: adaptive-astro
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - adaptive-astro-network

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: adaptive-astro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/adaptive-astro
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - adaptive-astro-network
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: adaptive-astro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - adaptive-astro-network

networks:
  adaptive-astro-network:
    driver: bridge

volumes:
  mongodb_data:
