name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [] # runs independently; CI is a separate workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'dist' \
            --exclude 'venv' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_DEPLOY_PATH }}/

      - name: Rebuild and restart containers
        uses: appleboy/ssh-action@v1
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NVIDIA_API_KEY
          script: |
            set -e
            cd ${{ secrets.SSH_DEPLOY_PATH }}

            # Persist secrets to .env so docker-compose's ${VAR:-} substitution
            # picks them up — both for this deploy and for any future manual
            # `docker-compose restart` after an SSH session.
            umask 077
            cat > .env <<EOF
            NVIDIA_API_KEY=${NVIDIA_API_KEY}
            EOF
            umask 022

            echo "--- Stopping containers ---"
            docker-compose -f docker/docker-compose.yml down

            echo "--- Building and starting ---"
            docker-compose -f docker/docker-compose.yml up -d --build --force-recreate

            echo "--- Running migrations ---"
            docker-compose -f docker/docker-compose.yml exec -T backend npm run migrate 2>/dev/null || true

            echo "--- Pruning old images ---"
            docker image prune -f

            echo "--- Deploy complete: $(date) ---"
            docker-compose -f docker/docker-compose.yml ps
