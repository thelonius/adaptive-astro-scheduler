# Full local development setup with ephemeris backend
# Run with: docker-compose -f docker/docker-compose.local.yml up -d

services:
  # Ephemeris API (Python/FastAPI with Skyfield)
  ephemeris:
    build:
      context: ../lunar-calendar-api
      dockerfile: Dockerfile.ephemeris
    container_name: astro_ephemeris_local
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - PROJECT_NAME=Lunar Calendar & Ephemeris API
      - VERSION=1.0.0
      - API_V1_PREFIX=/api/v1
      - PYTHONUNBUFFERED=1
    volumes:
      - ephemeris_cache:/tmp/skyfield-cache
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - astro_local_network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: astro_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adaptive_astro
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - astro_local_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: astro_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - astro_local_network

  # Backend API (Node.js/TypeScript)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: astro_backend_local
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adaptive_astro
      REDIS_URL: redis://redis:6379
      EPHEMERIS_MODE: api
      # Point to local ephemeris container
      EPHEMERIS_API_URL: http://ephemeris:8000
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-8533167222:AAFhy1o23kD0x702K1FhhxvZCehryGRm7YE}"
      TELEGRAM_WEBHOOK_URL: ""
      USE_MOCK_EPHEMERIS: "false"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ephemeris:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/backend/src
      - ../shared/src:/app/shared/src
    restart: unless-stopped
    networks:
      - astro_local_network

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: astro_frontend_local
    environment:
      - VITE_API_URL=http://localhost:3001
    ports:
      - "5173:80"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - astro_local_network

volumes:
  postgres_local_data:
  redis_local_data:
  ephemeris_cache:


networks:
  astro_local_network:
    name: astro_local_network
