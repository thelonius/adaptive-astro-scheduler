version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: astro_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adaptive_astro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: astro_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: astro_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/adaptive_astro
      REDIS_URL: redis://redis:6379
      EPHEMERIS_MODE: api
      EPHEMERIS_API_URL: http://ephemeris:8000
      TELEGRAM_BOT_TOKEN: "8533167222:AAFhy1o23kD0x702K1FhhxvZCehryGRm7YE"
      TELEGRAM_WEBHOOK_URL: "http://176.123.166.252:3000/webhook/telegram"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: adaptive_astro
      PGHOST: postgres
      PGPORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ephemeris:
        condition: service_started
    restart: unless-stopped

  # Ephemeris Service (Python)
  ephemeris:
    build:
      context: ../lunar-calendar-api
      dockerfile: Dockerfile
    container_name: astro_ephemeris
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Frontend (Telegram Mini App)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: astro_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: astro_network
