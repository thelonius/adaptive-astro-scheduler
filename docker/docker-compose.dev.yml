# Development setup - Infrastructure only (Ephemeris + Database + Redis)
# Run with: docker-compose -f docker/docker-compose.dev.yml up -d
# Then run backend and frontend locally with npm

services:
  # Ephemeris API (Python/FastAPI with Skyfield)
  ephemeris:
    build:
      context: ../lunar-calendar-api
      dockerfile: Dockerfile.ephemeris
    container_name: astro_ephemeris_dev
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - PROJECT_NAME=Lunar Calendar & Ephemeris API
      - VERSION=1.0.0
      - API_V1_PREFIX=/api/v1
      - PYTHONUNBUFFERED=1
    volumes:
      - ephemeris_cache:/tmp/skyfield-cache
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - astro_dev_network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: astro_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adaptive_astro
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - astro_dev_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: astro_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - astro_dev_network

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: astro_mlflow_dev
    ports:
      - "5001:5000"
    environment:
      - BACKEND_STORE_URI=sqlite:///mlflow.db
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    networks:
      - astro_dev_network

  # ML Inference & Processing Service (Python/FastAPI)
  ml_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml
    container_name: astro_ml_service_dev
    ports:
      - "8001:8001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ../scripts/ml:/app/scripts/ml
      - ../zet:/app/zet
    depends_on:
      - mlflow
    networks:
      - astro_dev_network

volumes:
  postgres_dev_data:
  redis_dev_data:
  ephemeris_cache:
  mlflow_data:

networks:
  astro_dev_network:
    name: astro_dev_network
