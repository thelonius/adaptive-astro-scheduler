<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Calendar Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .lunar-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-box h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .info-box p {
            color: #666;
            line-height: 1.6;
        }

        .moon-phase {
            text-align: center;
            font-size: 4em;
            margin: 20px 0;
        }

        .color-palette {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            height: 40px;
        }

        .color-swatch {
            flex: 1;
            border-radius: 5px;
        }

        .recommendation-list {
            list-style: none;
        }

        .recommendation-list li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .recommendation-list li:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
        }

        .not-recommended-list li:before {
            content: "✗ ";
            color: #dc3545;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.5em;
        }

        .error {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px 5px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .date-input {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
            margin: 10px 5px;
        }

        .lunar-day-number {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 Lunar Calendar</h1>

        <div class="card">
            <div style="text-align: center;">
                <input type="date" id="dateInput" class="date-input">
                <button onclick="loadLunarDay()">Get Lunar Info</button>
                <button onclick="loadToday()">Today</button>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading...</div>

        <div id="content" style="display: none;">
            <div class="card">
                <h2>Lunar Day Information</h2>
                <div class="lunar-day-number" id="lunarDayNumber"></div>
                <div class="moon-phase" id="moonPhaseEmoji"></div>
                <div style="text-align: center;">
                    <h3 id="moonPhaseName"></h3>
                    <p id="illumination"></p>
                </div>
            </div>

            <div class="card">
                <h2>Color Palette</h2>
                <div class="color-palette" id="colorPalette"></div>
            </div>

            <div class="lunar-info">
                <div class="info-box">
                    <h3>General Description</h3>
                    <p id="generalDescription"></p>
                </div>

                <div class="info-box">
                    <h3>Planetary Influence</h3>
                    <p><strong>Dominant Planet:</strong> <span id="dominantPlanet"></span></p>
                    <p id="planetaryDescription"></p>
                </div>
            </div>

            <div class="lunar-info">
                <div class="info-box">
                    <h3>Health Aspects</h3>
                    <p><strong>Affected Organs:</strong></p>
                    <ul id="affectedOrgans" class="recommendation-list"></ul>
                </div>

                <div class="info-box">
                    <h3>Health Tips</h3>
                    <ul id="healthTips" class="recommendation-list"></ul>
                </div>
            </div>

            <div class="lunar-info">
                <div class="info-box">
                    <h3>Recommended Activities</h3>
                    <ul id="recommended" class="recommendation-list"></ul>
                </div>

                <div class="info-box">
                    <h3>Not Recommended</h3>
                    <ul id="notRecommended" class="recommendation-list not-recommended-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';

        // Set today's date on load
        document.getElementById('dateInput').valueAsDate = new Date();

        function loadToday() {
            document.getElementById('dateInput').valueAsDate = new Date();
            loadLunarDay();
        }

        async function loadLunarDay() {
            const dateInput = document.getElementById('dateInput').value;
            if (!dateInput) {
                showError('Please select a date');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/lunar-day?date=${dateInput}`);
                if (!response.ok) throw new Error('Failed to fetch lunar data');

                const data = await response.json();
                displayLunarDay(data);
                showContent(true);
            } catch (error) {
                showError('Error loading lunar data: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayLunarDay(data) {
            // Lunar day number
            document.getElementById('lunarDayNumber').textContent = `Lunar Day ${data.lunar_day}`;

            // Moon phase
            document.getElementById('moonPhaseEmoji').textContent = data.moon_phase.emoji;
            document.getElementById('moonPhaseName').textContent = data.moon_phase.name;
            document.getElementById('illumination').textContent =
                `${data.moon_phase.illumination}% illuminated • ${data.moon_phase.is_waxing ? 'Waxing' : 'Waning'}`;

            // Color palette
            const paletteDiv = document.getElementById('colorPalette');
            paletteDiv.innerHTML = '';
            data.color_palette.gradient.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.title = color;
                paletteDiv.appendChild(swatch);
            });

            // General info
            document.getElementById('generalDescription').textContent = data.general_description;
            document.getElementById('dominantPlanet').textContent = data.planetary_influence.dominant_planet || 'N/A';
            document.getElementById('planetaryDescription').textContent = data.planetary_influence.description;

            // Health
            populateList('affectedOrgans', data.health.affected_organs);
            populateList('healthTips', data.health.health_tips);

            // Recommendations
            populateList('recommended', data.recommendations.recommended);
            populateList('notRecommended', data.recommendations.not_recommended);
        }

        function populateList(elementId, items) {
            const list = document.getElementById(elementId);
            list.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                list.appendChild(li);
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showContent(show) {
            document.getElementById('content').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // Load today's data on page load
        loadToday();
    </script>
</body>
</html>
