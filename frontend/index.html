<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Astro Scheduler</title>

  <!-- Google Fonts: non-blocking preconnect + stylesheet (replaces CSS @import) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />

  <!-- Cesium CDN: defer so it does NOT block HTML parsing or first render -->
  <link rel="stylesheet" href="https://unpkg.com/cesium@1.138.0/Build/Cesium/Widgets/widgets.css" media="print" onload="this.media='all'" />
  <script defer src="https://unpkg.com/cesium@1.138.0/Build/Cesium/Cesium.js"></script>

  <!-- Telegram Mini App SDK: async so it does NOT block rendering -->
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
